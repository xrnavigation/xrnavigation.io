{{ define "main" }}
<article class="ast-article-single audiom-embed-page">
  <div class="entry-content clear">
    <div class="wp-block-uagb-container alignfull uagb-is-root-container">
      <div class="uagb-container-inner-blocks-wrap">
        <div class="wp-block-uagb-advanced-heading">
          <h1 class="uagb-heading-text">{{ .Title }}</h1>
        </div>
        <div class="page-content">
          {{ .Content }}
        </div>
        {{ with .Params.audiom_id }}
        <iframe
          src="https://www.audiom.net/embed/{{ . }}"
          width="100%"
          height="560"
          style="border: 0;"
          title="{{ $.Title }}"
          loading="lazy"
          allowfullscreen>
        </iframe>
        {{ end }}
      </div>
    </div>
  </div>
</article>
{{ end }}
