<!DOCTYPE html>
<html lang="en">
<head>
  {{ partial "head.html" . }}
</head>
{{ $isBlogSingle := and .IsPage (eq .Section "blog") }}
<body class="ast-hfb-header{{ if not $isBlogSingle }} ast-page-builder-template{{ end }}{{ if .IsHome }} home-page{{ end }}{{ if eq .Type "audiom-embed" }} audiom-embed-body{{ end }}{{ if $isBlogSingle }} single single-post ast-separate-container ast-no-sidebar ast-single-post{{ end }}">
  <a class="skip-link" href="#content">Skip to content</a>
  <div id="page" class="site hfb-header{{ if not $isBlogSingle }} ast-page-builder-template{{ end }}">
    {{ partial "header.html" . }}
    {{ block "before-content" . }}{{ end }}
    <div id="content" class="site-content">
      <div class="ast-container">
        <div id="primary" class="content-area">
          <main id="main" class="site-main" tabindex="-1">
            {{ block "main" . }}{{ end }}
          </main>
        </div>
      </div>
    </div>
    {{ block "after-content" . }}{{ end }}
    {{ partial "footer.html" . }}
  </div>
  <script src="{{ "js/mobile-menu.js" | relURL }}"></script>
  {{ if .IsHome }}
  <script src="{{ "vendor/jquery.min.js" | relURL }}"></script>
  <script src="{{ "vendor/ableplayer/ableplayer.min.js" | relURL }}"></script>
  {{ end }}
</body>
</html>
